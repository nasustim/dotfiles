# .mise.toml is linked from user directory via confs/.config/mise/config.toml
# to make it recognized from renovate

[tools]
node = "24.16.0"
"npm:@anthropic-ai/claude-code" = "2.1.165"
"npm:@openai/codex" = "0.137.0"
"npm:@github/copilot" = "1.0.39"
uv = "0.11.19"
gh = "2.78.0"
rust = "1.96.0"
bun = "1.3.13"
ripgrep = "15.1.0"
go = "1.26.2"
jq = "1.8.1"
yq = "4.53.2"
awscli = "2.33.31"
"go:github.com/d-kuro/gwq/cmd/gwq" = "0.1.1"
"go:github.com/x-motemen/ghq" = "1.10.1"

[settings]
idiomatic_version_file_enable_tools = ["ruby"]
